<svg xmlns="http://www.w3.org/2000/svg" width="1152" height="576" viewBox="0 0 1152 576" role="img" aria-labelledby="title desc">
  <title id="title">Oxink SlashInput preview</title>
  <desc id="desc">A terminal-style preview of the Oxink SlashInput component with a slash command dropdown.</desc>
  <rect width="1152" height="576" fill="#1b1c1e"/>

  <g fill="#e7e7e7" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="22">
    <text x="28" y="36">Type text normally. Enter / as the first character to open suggestions.</text>
    <text x="28" y="64">Up/Down selects, Enter/Tab applies the suggestion, Ctrl-V pastes.</text>
    <text x="28" y="92">Ctrl-C or Ctrl-D exits the example.</text>
    <text x="28" y="120">The demo clipboard starts with /help.</text>
  </g>

  <g transform="translate(28 160)">
    <rect x="0" y="0" width="444" height="68" fill="#353535"/>
    <rect x="0" y="14" width="444" height="2" fill="#65d6ff"/>
    <rect x="0" y="54" width="444" height="2" fill="#65d6ff"/>
    <rect x="8" y="10" width="2" height="48" fill="#65d6ff"/>
    <rect x="434" y="10" width="2" height="48" fill="#65d6ff"/>
    <rect x="28" y="22" width="28" height="34" fill="#353535"/>
    <text x="30" y="49" fill="#f4f4f4" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="24">/</text>
    <rect x="46" y="24" width="12" height="28" fill="#f4f4f4"/>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="26">
    <text x="42" y="294" fill="#4b97ff">/help</text>
    <text x="182" y="294" fill="#4b97ff">Show available commands</text>

    <text x="42" y="322" fill="#f1f1f1">/hello</text>
    <text x="182" y="322" fill="#f1f1f1">Insert a greeting</text>

    <text x="42" y="350" fill="#f1f1f1">/history</text>
    <text x="182" y="350" fill="#f1f1f1">View recent commands</text>

    <text x="42" y="378" fill="#f1f1f1">/theme</text>
    <text x="182" y="378" fill="#f1f1f1">Change terminal colors</text>

    <text x="42" y="406" fill="#f1f1f1">/clear</text>
    <text x="182" y="406" fill="#f1f1f1">Clear the current session</text>

    <text x="42" y="434" fill="#f1f1f1">/quit</text>
    <text x="182" y="434" fill="#f1f1f1">Exit the current prompt</text>
  </g>

  <g fill="#e7e7e7" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="22">
    <text x="28" y="490">Value: /</text>
    <text x="28" y="518">Clipboard: /help</text>
    <text x="28" y="546">Status: Suggestion selected: /help</text>
  </g>
</svg>
